spring.application.name=transaction-service
server.port=8082
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/BankingSystem

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5434/transactiondb
spring.datasource.username=transaction_user
spring.datasource.password=transaction123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.banking.security.transaction=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=WARN
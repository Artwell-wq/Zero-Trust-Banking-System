spring.application.name=account-service
server.port=8081
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/BankingSystem

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5433/accountdb
spring.datasource.username=account_user
spring.datasource.password=account123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.banking.security.account=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=WARN
# Send logs to Elasticsearch directly
logging.file.name=logs/account-service.log

input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [message] =~ "AUDIT" {
    mutate {
      add_tag => ["audit", "dora-compliance"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "banking-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}